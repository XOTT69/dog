<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0ea5e9">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="AI-тренер для собаки — щоденник, курси, здоров'я, поради">
  <title>Dog Coach AI</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐕</text></svg>">
  <link rel="apple-touch-icon" href="/assets/icon-192.png">

  <!-- Critical CSS inline for FCP -->
  <style>
    body{margin:0;font-family:-apple-system,system-ui,sans-serif;background:#f8f9fa;color:#1a1a2e}
    .auth-screen{min-height:100dvh;display:grid;place-items:center;padding:2rem}
    .overlay{position:fixed;inset:0;display:grid;place-items:center;background:rgba(0,0,0,0.3);z-index:9999;backdrop-filter:blur(8px)}
    .spinner{width:44px;height:44px;border:3px solid #e9ecef;border-top-color:#0ea5e9;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .hidden{display:none!important}
    .skeleton{background:linear-gradient(90deg,#f1f3f5 25%,#e9ecef 50%,#f1f3f5 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:10px;height:1rem;margin:0.5rem 0}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  </style>
  <link rel="stylesheet" href="/styles.css">

  <!-- Firebase Modular SDK via importmap -->
  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js",
      "firebase/messaging": "https://www.gstatic.com/firebasejs/10.12.5/firebase-messaging.js"
    }
  }
  </script>

  <!-- App entry point (module) -->
  <script type="module" src="/js/main.js"></script>
</head>
<body>
  <div id="offlineBar" class="offline-bar">📡 Офлайн — дані збережуться при підключенні</div>
  <div id="toastContainer" aria-live="polite"></div>
  <div id="loadingOverlay" class="overlay hidden" aria-hidden="true"><div class="spinner"></div></div>

  <!-- AUTH (unchanged structure) -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-icon">🐕</div>
      <h1>Dog Coach</h1>
      <p class="auth-desc">AI-тренер для вашого песика</p>
      <button id="googleLoginBtn" class="btn btn-login" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Увійти через Google
      </button>
      <p class="auth-footer">Безкоштовно · Без реклами · Дані захищені 🔒</p>
    </div>
  </div>

  <!-- ONBOARDING (added toiletMode step) -->
  <div id="onboardingScreen" class="onboarding hidden">
    <div class="onboarding-card">
      <div id="onboardingStep1" class="onboarding-step">
        <div class="onboarding-emoji">🐾</div>
        <h2>Як звати вашого песика?</h2>
        <input id="obName" type="text" placeholder="Ім'я" class="ob-input" autocomplete="off" required>
        <button class="btn btn-primary full-width" id="obNext1" type="button">Далі →</button>
      </div>
      <div id="onboardingStep2" class="onboarding-step hidden">
        <div class="onboarding-emoji">🎂</div>
        <h2>Коли народився?</h2>
        <input id="obBirthDate" type="date" class="ob-input">
        <p class="text-muted" style="margin-bottom:1rem">Якщо не знаєте — пропустіть</p>
        <div class="ob-row"><button class="btn btn-ghost" id="obBack2" type="button">←</button><button class="btn btn-primary" id="obNext2" type="button">Далі →</button></div>
      </div>
      <div id="onboardingStep3" class="onboarding-step hidden">
        <div class="onboarding-emoji">🐕</div>
        <h2>Розкажіть більше</h2>
        <select id="obSex" class="ob-input"><option value="хлопчик">🐶 Хлопчик</option><option value="дівчинка">🐶 Дівчинка</option></select>
        <input id="obBreed" type="text" placeholder="Порода (необов'язково)" class="ob-input" autocomplete="off">
        <label class="ob-label">🚽 Як ходить в туалет?</label>
        <select id="obToiletMode" class="ob-input">
          <option value="pad">Пелюшка вдома</option>
          <option value="outdoor">На вулиці</option>
          <option value="transition">Переходимо на вулицю</option>
        </select>
        <div class="ob-row"><button class="btn btn-ghost" id="obBack3" type="button">←</button><button class="btn btn-primary" id="obFinish" type="button">Готово! 🎉</button></div>
      </div>
      <div class="ob-dots"><span class="ob-dot active" data-step="1"></span><span class="ob-dot" data-step="2"></span><span class="ob-dot" data-step="3"></span></div>
    </div>
  </div>

  <!-- APP (same structure, body unchanged from original) -->
  <!-- ... rest of body same as before ... -->

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(r => console.log('[SW] Registered:', r.scope))
          .catch(e => console.warn('[SW] Failed:', e));
      });
    }
  </script>
</body>
</html>
