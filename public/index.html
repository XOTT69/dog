<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0e766e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Doggo Coach</title>
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <div id="appLoader"><div class="loader-inner"><div class="spinner"></div></div></div>
  <div id="toastContainer"></div>

  <!-- AUTH -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">🐶</div>
      <h1 class="auth-title">Doggo Coach</h1>
      <p class="auth-subtitle">Щоденник виховання собаки для всієї сім'ї</p>
      <button class="btn-google" id="googleLoginBtn" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Увійти через Google
      </button>
      <p class="auth-hint">Дані зберігаються у хмарі. Доступ з будь-якого пристрою.</p>
    </div>
  </div>

  <!-- APP -->
  <div id="appContent" class="hidden">

    <!-- HEADER -->
    <header class="app-header">
      <div class="header-left">
        <strong id="petNameHeader">🐶</strong>
      </div>
      <div class="header-right">
        <button class="header-btn" data-theme-toggle>🌙</button>
        <button class="header-btn" id="logoutBtn" style="display:none">↩</button>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="app-main" id="appMain">

      <!-- TAB: HOME -->
      <section class="tab-panel active" id="tabHome">

        <!-- Quick Actions -->
        <div class="quick-grid">
          <button class="q-btn q-success" data-quick-event="pad"><span class="q-icon">🧻</span><span class="q-label">Пелюшка</span></button>
          <button class="q-btn q-success" data-quick-event="outdoor"><span class="q-icon">🌳</span><span class="q-label">Вулиця</span></button>
          <button class="q-btn q-danger" data-quick-event="miss"><span class="q-icon">❌</span><span class="q-label">Промах</span></button>
          <button class="q-btn q-neutral" data-quick-event="feed"><span class="q-icon">🍖</span><span class="q-label">Їжа</span></button>
          <button class="q-btn q-neutral" data-quick-event="sleep"><span class="q-icon">😴</span><span class="q-label">Сон</span></button>
          <button class="q-btn q-neutral" id="openFullForm"><span class="q-icon">＋</span><span class="q-label">Інше</span></button>
        </div>

        <!-- Today Stats -->
        <div class="stats-row">
          <div class="stat"><span class="stat-val" id="kpiPad">0</span><span class="stat-lbl">🧻</span></div>
          <div class="stat"><span class="stat-val" id="kpiOutdoor">0</span><span class="stat-lbl">🌳</span></div>
          <div class="stat"><span class="stat-val" id="kpiMiss">0</span><span class="stat-lbl">❌</span></div>
          <div class="stat"><span class="stat-val" id="kpiTotal">0</span><span class="stat-lbl">всього</span></div>
        </div>

        <!-- Tip of the day -->
        <div class="tip-banner" id="tipBanner">
          <div class="tip-emoji" id="tipEmoji">💡</div>
          <div class="tip-text" id="tipText">Завантаження...</div>
        </div>

        <!-- Recent Events -->
        <div class="section-header"><h2>Сьогодні</h2></div>
        <div class="feed" id="recentLogs"></div>

      </section>

      <!-- TAB: LEARN -->
      <section class="tab-panel" id="tabLearn">
        <div class="section-header"><h2>Навчання</h2><span class="subtle" id="ageSummaryBadge"></span></div>

        <!-- Today Plan -->
        <div class="learn-card" id="todayPlanCard">
          <h3>📋 План на сьогодні</h3>
          <div id="todayPlan"></div>
        </div>

        <!-- Courses -->
        <div class="section-header"><h2>Курси</h2></div>
        <div class="course-list" id="courseGrid"></div>
        <div id="selectedCourse"></div>

        <!-- Knowledge -->
        <div class="section-header mt-6"><h2>База знань</h2></div>
        <div class="knowledge-list" id="knowledgeGrid"></div>

        <!-- Socialization -->
        <div class="section-header mt-6"><h2>Соціалізація</h2></div>
        <div id="socialChecklist"></div>
      </section>

      <!-- TAB: PROFILE -->
      <section class="tab-panel" id="tabProfile">
        <div class="section-header"><h2>Профіль</h2></div>

        <div class="profile-card">
          <form id="petProfileForm">
            <div class="form-row">
              <div class="field"><label>Ім'я</label><input id="petName" type="text" placeholder="Беллі" /></div>
              <div class="field"><label>Дата народження</label><input id="petBirthDate" type="date" /></div>
            </div>
            <div class="form-row">
              <div class="field"><label>Стать</label><select id="petSex"><option value="">—</option><option value="дівчинка">♀ Дівчинка</option><option value="хлопчик">♂ Хлопчик</option></select></div>
              <div class="field"><label>Порода</label><input id="petBreed" type="text" placeholder="Метис" /></div>
            </div>
            <div class="form-row">
              <div class="field"><label>Вага, кг</label><input id="petWeight" type="number" step="0.1" placeholder="5" /></div>
              <div class="field"><label>Вдома з</label><input id="petHomeDate" type="date" /></div>
            </div>
            <div class="form-row">
              <div class="field"><label>Вакцинація</label><select id="petVaccination"><option value="не вказано">—</option><option value="ще не завершена">Не завершена</option><option value="частково завершена">Частково</option><option value="завершена">Завершена</option></select></div>
              <div class="field"><label>Туалет</label><select id="petToiletMode"><option value="pad">Пелюшка</option><option value="mixed">Змішаний</option><option value="outdoor">Вулиця</option></select></div>
            </div>
            <div class="field full"><label>Нотатки</label><textarea id="petNotes" rows="2" placeholder="Страхи, особливості..."></textarea></div>
            <button class="btn-primary full-w" type="submit">Зберегти</button>
          </form>
        </div>

        <!-- Family -->
        <div class="section-header mt-6"><h2>Сім'я</h2></div>
        <div class="profile-card">
          <div class="family-info">
            <div><strong>Простір:</strong> <span id="workspaceName">—</span></div>
            <div><strong>Код:</strong> <span id="inviteCodeView" class="mono">—</span> <button class="btn-sm" id="copyInviteBtn">📋</button></div>
          </div>
          <div id="membersList" class="members-list"></div>
          <form id="joinWorkspaceForm" class="join-form">
            <input id="inviteCodeInput" type="text" placeholder="Код запрошення" autocapitalize="characters" />
            <button class="btn-sm" type="submit">Приєднатись</button>
          </form>
        </div>
      </section>

    </main>

    <!-- BOTTOM SHEET: Full Event Form -->
    <div class="bottom-sheet hidden" id="eventSheet">
      <div class="sheet-backdrop" id="sheetBackdrop"></div>
      <div class="sheet-content">
        <div class="sheet-handle"></div>
        <h3>Додати запис</h3>
        <form id="eventForm">
          <div class="form-row">
            <div class="field"><label>Тип</label><select id="eventType"><option value="pad">🧻 Пелюшка</option><option value="outdoor">🌳 Вулиця</option><option value="miss">❌ Промах</option><option value="feed">🍖 Їжа</option><option value="water">💧 Вода</option><option value="sleep">😴 Сон</option><option value="walk">🚶 Прогулянка</option><option value="training">🎓 Тренування</option><option value="note">📝 Нотатка</option></select></div>
            <div class="field"><label>Час</label><input id="eventTime" type="time" /></div>
          </div>
          <div class="form-row">
            <div class="field"><label>Тригер</label><select id="eventTrigger"><option>Після сну</option><option>Після їжі</option><option>Після гри</option><option>Перед сном</option><option>Без причини</option></select></div>
            <div class="field"><label>Хто</label><input id="eventBy" type="text" placeholder="Ім'я" /></div>
          </div>
          <div class="field full"><label>Деталі</label><textarea id="eventNote" rows="2" placeholder="Опціонально"></textarea></div>
          <button class="btn-primary full-w" type="submit">Зберегти</button>
        </form>
      </div>
    </div>

    <!-- BOTTOM TABS -->
    <nav class="bottom-nav">
      <button class="nav-tab active" data-tab="tabHome"><span>🏠</span>Головна</button>
      <button class="nav-tab" data-tab="tabLearn"><span>📖</span>Навчання</button>
      <button class="nav-tab" data-tab="tabProfile"><span>⚙️</span>Профіль</button>
    </nav>

  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
